services:
  - type: web
    name: cong-xuong-agent-qc-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEB_UI_ALLOWED_ORIGINS
        value: https://tranquangtong.github.io
      - key: WEB_UI_SHARED_PASSCODE
        sync: false
      - key: WEB_UI_TOKEN_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
